<sly data-sly-use.model="com.mysite.core.models.Cards"
    data-sly-use.templates="core/wcm/components/commons/v1/templates.html" />

<sly data-sly-call="${templates.placeholder @ isEmpty=model.empty}" />

<section class="album-cards" data-sly-test="${!model.empty}">
    <div class="album-cards__grid" data-sly-list.card="${model.cards}"> 
        <article class="album-cards__card">
            <div class="album-cards__thumbnail">
                <img class="album-cards__thumbnail-img" src="${card.imageUrl @ context='uri'}"
                    alt="${card.imageAlt @ context='text'}" loading="lazy" data-sly-test="${card.imageUrl}" />
                <div class="album-cards__thumbnail-placeholder" data-sly-test="${!card.imageUrl}">
                    <span>Thumbnail</span>
                </div>
            </div>
            <div class="album-cards__body">
                <p class="album-cards__description" data-sly-test="${card.description}">
                    ${card.description @ context='html'}
                </p>
                <footer class="album-cards__footer">
                    <div class="album-cards__actions" data-sly-test="${card.viewLink || card.editLink}">
                        <a class="album-cards__action-btn" href="${card.viewLink @ context='uri'}"
                            data-sly-test="${card.viewLink}">
                            View
                        </a>
                        <a class="album-cards__action-btn" href="${card.editLink @ context='uri'}"
                            data-sly-test="${card.editLink}">
                            Edit
                        </a>
                    </div>
                    <span class="album-cards__reading-time" data-sly-test="${card.readingTime}">
                        ${card.readingTime @ context='text'} mins
                    </span>
                </footer>
            </div>
        </article>
    </div>
</section>
