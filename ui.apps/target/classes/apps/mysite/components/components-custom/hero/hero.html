<sly data-sly-use.model="com.mysite.core.models.Hero"
     data-sly-use.templates="core/wcm/components/commons/v1/templates.html"/>

<sly data-sly-call="${templates.placeholder @ isEmpty=model.title}"/>
 
<section class="album-hero">
    <div class="album-hero__inner">
        <h1 class="album-hero__title"
            data-sly-test="${model.title}">
            ${model.title @ context='text'}
        </h1>
        <p class="album-hero__description"
           data-sly-test="${model.description}">
            ${model.description @ context='html'}
        </p>
        <div class="album-hero__actions"
             data-sly-test="${model.primaryCtaLabel || model.secondaryCtaLabel}">
            <a class="album-hero__btn album-hero__btn--primary"
               href="${model.primaryCtaLink @ context='uri'}"
               data-sly-test="${model.primaryCtaLabel}">
                ${model.primaryCtaLabel @ context='text'}
            </a>
            <a class="album-hero__btn album-hero__btn--secondary"
               href="${model.secondaryCtaLink @ context='uri'}"
               data-sly-test="${model.secondaryCtaLabel}">
                ${model.secondaryCtaLabel @ context='text'}
            </a>
        </div>
    </div>
</section>
